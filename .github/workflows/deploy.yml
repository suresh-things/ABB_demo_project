name: Build & Deploy to AKS

on:
  push:
    branches:
      - main
      - staging
      - dev
      - feature/*

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    container:
      image: docker:latest
    environment: ${{ github.ref_name }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Environment Variables
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "ENV=prod" >> $GITHUB_ENV
          elif [ "${{ github.ref_name }}" == "staging" ]; then
            echo "ENV=staging" >> $GITHUB_ENV
          else
            echo "ENV=dev" >> $GITHUB_ENV
          fi

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get ACR Login Server
        run: |
          ACR_NAME=${{ secrets[format('ACR_{0}', env.ENV)] }}.azurecr.io
          echo "ACR_NAME=$ACR_NAME" >> $GITHUB_ENV

      - name: Login to ACR
        run: echo "${{ secrets[format('ACR_PASSWORD_{0}', env.ENV)] }}" | \
             docker login $ACR_NAME -u ${{ secrets[format('ACR_USERNAME_{0}', env.ENV)] }} --password-stdin

      - name: Build and Push Docker Image
        run: |
          IMAGE_NAME=$ACR_NAME/my-app:${{ github.sha }}
          docker build -t $IMAGE_NAME .
          docker push $IMAGE_NAME
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      - name: Get AKS Credentials
        run: |
          az aks get-credentials --resource-group ${{ secrets[format('RESOURCE_GROUP_{0}', env.ENV)] }} \
                                 --name ${{ secrets[format('AKS_CLUSTER_{0}', env.ENV)] }}

      - name: Deploy to AKS
        run: |
          kubectl set image deployment/my-app my-app=$IMAGE_NAME --record
          kubectl rollout status deployment/my-app
